name: Daily Data Collection (CSI300)

on:
  schedule:
    - cron: "30 7 * * 1-5"   # 北京时间 15:30
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install pandas requests python-dotenv psycopg2-binary baostock numpy

      - name: Collect CSI300 daily data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python python/data_pipeline/collect_csi300.py

      - name: Run inference
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python python/model/inference_csi300.py

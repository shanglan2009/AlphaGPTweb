name: Daily Data Collection (CSI300)

on:
  schedule:
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet pandas psycopg2-binary numpy baostock
          python -c "import baostock; print('baostock OK')"
          python -c "import psycopg2; print('psycopg2 OK')"

      - name: Collect CSI300 data + Generate picks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "=== Step 1: Data Collection ==="
          python python/data_pipeline/collect_csi300.py
          echo "=== Step 2: Inference ==="
          python python/model/inference_csi300.py

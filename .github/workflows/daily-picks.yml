name: Daily Stock Picks

on:
  schedule:
    # 北京时间每个交易日 16:00 (UTC+8 → UTC 08:00)
    - cron: "0 8 * * 1-5"
  workflow_dispatch:  # 支持手动触发

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
  UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
  TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
  TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}

jobs:
  daily-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install baostock  # 免费数据源

      - name: Run daily pipeline
        run: |
          cd python
          python scheduler/daily_job.py

      - name: Commit picks result
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python/data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 Daily picks $(date +%Y-%m-%d)"
          git push

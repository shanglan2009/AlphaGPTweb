name: Daily Stock Picks

on:
  schedule:
    - cron: "0 8 * * 1-5"   # 北京时间 16:00
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install pandas psycopg2-binary numpy

      - name: Generate daily picks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python python/model/inference_csi300.py

name: Weekly Model Training

on:
  schedule:
    - cron: "0 18 * * 5"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pandas numpy psycopg2-binary

      - name: Weekly iteration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "SKIP: DATABASE_URL not configured"
            exit 0
          fi
          echo "=== Weekly model training ==="
          echo "Placeholder: full AlphaGPT training TBD"
          echo "Complete"

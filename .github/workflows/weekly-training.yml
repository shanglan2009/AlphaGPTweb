name: Weekly Model Training

on:
  schedule:
    # 每周六北京时间 02:00 (UTC+8 → UTC 周五 18:00)
    - cron: "0 18 * * 5"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  weekly-training:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run weekly training
        run: |
          cd python
          python scheduler/weekly_job.py

      - name: Evaluate and switch model
        if: success()
        run: |
          echo "Comparing model versions..."
          # TODO: 实现自动模型切换逻辑
          echo "Model evaluation complete"

      - name: Commit model update
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python/model/ python/data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Weekly model training $(date +%Y-%m-%d)"
          git push

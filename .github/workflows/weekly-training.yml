name: Weekly Model Training

on:
  schedule:
    - cron: "0 18 * * 5"   # 周六 02:00 北京时间
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install pandas numpy psycopg2-binary

      - name: Weekly model iteration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "=== Weekly model training placeholder ==="
          echo "Training new model with latest CSI300 data..."
          echo "Evaluating vs current model..."
          echo "Auto-switch if win rate improved"
